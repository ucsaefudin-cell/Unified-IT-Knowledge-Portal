{% extends "base.html" %}
{% block title %}Login — Unified IT Knowledge Portal{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">

    <!-- Header form login -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-gradient-to-br from-sap to-gcp rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <span class="text-white font-bold text-lg">IT</span>
      </div>
      <h1 class="text-2xl font-extrabold text-gray-900"
          data-en="Welcome Back" data-id="Selamat Datang Kembali">Welcome Back</h1>
      <p class="text-gray-500 text-sm mt-1"
         data-en="Login to access best practice content"
         data-id="Login untuk mengakses konten praktik terbaik">
        Login to access best practice content
      </p>
    </div>

    <!-- Form login -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <form method="POST" action="{{ url_for('auth.handle_login_form') }}" class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5"
                 data-en="Email Address" data-id="Alamat Email">Email Address</label>
          <input type="email" name="email" required
                 class="w-full px-4 py-2.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sap/30 focus:border-sap transition-colors"
                 placeholder="you@example.com" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5"
                 data-en="Password" data-id="Kata Sandi">Password</label>
          <input type="password" name="password" required
                 class="w-full px-4 py-2.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sap/30 focus:border-sap transition-colors"
                 placeholder="••••••••" />
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-sap hover:bg-sap-dark text-white text-sm font-semibold rounded-lg transition-colors shadow-sm">
          <span data-en="Login" data-id="Masuk">Login</span>
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        <span data-en="Don't have an account?" data-id="Belum punya akun?">Don't have an account?</span>
        <a href="{{ url_for('auth.handle_registration_form') }}" class="text-sap font-semibold hover:underline ml-1">
          <span data-en="Register free" data-id="Daftar gratis">Register free</span>
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
