{% extends "base.html" %}
{% block title %}Daftar — IT Knowledge Portal{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white border rounded-xl p-8 shadow-sm">
    <h2 class="text-2xl font-bold mb-6">Buat Akun Baru</h2>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" name="email" required
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Password (min. 8 karakter)</label>
            <input type="password" name="password" required minlength="8"
                   class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <button type="submit"
                class="w-full bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700">
            Daftar
        </button>
    </form>
    <p class="mt-4 text-sm text-center text-gray-500">
        Sudah punya akun? <a href="{{ url_for('auth.login') }}" class="text-blue-600">Login</a>
    </p>
</div>
{% endblock %}
